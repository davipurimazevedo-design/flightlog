<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlightLog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 420px;
      height: 260px;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }

    .card {
      width: 420px;
      height: 260px;
      background: #060f1e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
      overflow: hidden;
    }

    /* Brilho sutil no topo */
    .card::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      height: 120px;
      background: radial-gradient(ellipse, rgba(96,165,250,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Avião animado ─────────────────────────────── */
    .plane-track {
      position: relative;
      width: 280px;
      height: 60px;
      margin-bottom: 4px;
    }

    .plane-icon {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      animation: flyAcross 2.8s ease-in-out infinite;
      opacity: 0;
    }

    .plane-icon svg {
      width: 36px;
      height: 36px;
      fill: #60a5fa;
      filter: drop-shadow(0 0 8px rgba(96,165,250,0.6));
    }

    /* Linha de trilha */
    .trail {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(96,165,250,0.2), transparent);
      transform: translateY(-50%);
    }

    @keyframes flyAcross {
      0%   { left: -40px;  opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { left: 290px;  opacity: 0; }
    }

    /* ── Logo / título ─────────────────────────────── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .brand-name {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.03em;
    }

    .brand-tag {
      font-size: 11px;
      color: #3b82f6;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }

    /* ── Status ────────────────────────────────────── */
    .status-wrap {
      width: 280px;
      margin-top: 8px;
    }

    .status-text {
      font-size: 12px;
      color: #475569;
      text-align: center;
      margin-bottom: 8px;
      min-height: 16px;
      transition: opacity 0.3s;
    }

    /* Barra de progresso indeterminate */
    .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(to right, transparent, #3b82f6, #60a5fa, transparent);
      border-radius: 999px;
      animation: slide 1.6s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }

    /* ── Versão ────────────────────────────────────── */
    .version {
      position: absolute;
      bottom: 14px;
      right: 18px;
      font-size: 10px;
      color: rgba(255,255,255,0.12);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="plane-track">
      <div class="trail"></div>
      <div class="plane-icon">
        <!-- Ícone de avião (Lucide Plane) inline -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
        </svg>
      </div>
    </div>

    <div class="brand">
      <div>
        <div class="brand-name">FlightLog</div>
        <div class="brand-tag">Diário de Bordo Digital</div>
      </div>
    </div>

    <div class="status-wrap">
      <div class="status-text" id="status">Iniciando...</div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="version" id="ver">v1.15.1</div>
  </div>

  <script>
    function setStatus(msg) {
      const el = document.getElementById('status')
      el.style.opacity = '0'
      setTimeout(() => {
        el.textContent = msg
        el.style.opacity = '1'
      }, 200)
    }
  </script>
</body>
</html>
