# Mantém o backend no Render (free tier) acordado — evita o cold start de ~30s.
# O plano free dorme após ~15 min ocioso; um ping a cada 10 min o mantém quente.
# Crons do GitHub Actions são best-effort (podem atrasar sob carga) — tudo bem.
name: keep-alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # permite disparar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          # --max-time generoso p/ tolerar um eventual cold start; 3 tentativas.
          curl -sf --max-time 60 --retry 3 --retry-delay 20 \
            https://flightlog-api-owav.onrender.com/health
