# CI: roda os testes do backend (pytest) e do frontend (vitest + build) a cada push.
# Não bloqueia o auto-deploy da Vercel/Render — serve como alarme: se ficar
# vermelho no GitHub, o push tinha problema.
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Instala dependências
        run: pip install -r backend/requirements.txt -r telegram-bot/requirements.txt pytest
      - name: Testes
        working-directory: backend
        run: python -m pytest
        env:
          # bot.py instancia o cliente Groq no import — chaves fictícias bastam
          # (os testes só exercitam funções puras, sem chamadas externas)
          GROQ_API_KEY: ci-dummy
          TELEGRAM_TOKEN: ci-dummy
      - name: Auditoria de dependências (não bloqueante)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # npm install (não "ci"): o lockfile é gerado no Windows e o npm tem um bug
      # conhecido com dependências nativas opcionais (binários do Rollup) que faz
      # o "npm ci" estrito falhar em Linux.
      - name: Instala dependências
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Testes
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Auditoria de dependências (não bloqueante)
        continue-on-error: true
        working-directory: frontend
        run: npm audit --omit=dev
