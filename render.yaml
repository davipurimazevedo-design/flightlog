# Blueprint do Render para o backend FastAPI.
# No Render: New > Blueprint > aponte para este repositório.
# Os valores marcados sync:false você preenche no painel (são secretos).
services:
  - type: web
    name: flightlog-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Python 3.14 (default do Render) não tem wheels pré-compilados de pydantic-core
      # e tenta compilar via Rust, o que falha. 3.12 tem tudo pronto.
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Ativa os guardrails de produção: recusa subir sem auth/CORS, esconde /docs.
      - key: ENVIRONMENT
        value: "production"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Observabilidade opcional — preencha para ligar o Sentry (pode deixar vazio).
      - key: SENTRY_DSN
        sync: false
